name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: glit
            archive: glit-linux-x86_64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: glit
            archive: glit-macos-x86_64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: glit
            archive: glit-macos-arm64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: glit.exe
            archive: glit-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} .
          tar -czf ${{ matrix.archive }} ${{ matrix.binary }} README.md

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" .
          Compress-Archive -Path ${{ matrix.binary }}, README.md -DestinationPath ${{ matrix.archive }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}